<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horizon — JS Powered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Syne:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- React + Babel (no build step needed for Cloudflare Pages static deploy) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0e8; --surface: #ece7dd; --dark: #1a1710;
      --accent: #c8451a; --text: #1a1710; --muted: #7a7060;
      --border: rgba(26,23,16,0.12);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; font-weight: 300; overflow-x: hidden; }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999;
    }
    #root { min-height: 100vh; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);} }
    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    @keyframes rotateSlow { from{transform:translateY(-50%) rotate(0deg);} to{transform:translateY(-50%) rotate(360deg);} }

    /* NAV */
    .nav {
      position: fixed; top:0; left:0; right:0; z-index:200;
      display:flex; justify-content:space-between; align-items:center;
      padding:1.4rem 4rem;
      background:rgba(245,240,232,0.85); backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      animation: fadeIn 0.6s ease both;
    }
    .nav-logo { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700; cursor:pointer; }
    .nav-logo span { color:var(--accent); }
    .nav-links { display:flex; gap:2.5rem; list-style:none; }
    .nav-links a { color:var(--muted); text-decoration:none; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; transition:color 0.2s; }
    .nav-links a:hover { color:var(--text); }
    .nav-btn { background:var(--dark); color:var(--bg); border:none; padding:0.65rem 1.5rem; font-family:'Syne',sans-serif; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:background 0.2s; }
    .nav-btn:hover { background:var(--accent); }

    /* HERO */
    .hero { min-height:100vh; padding:10rem 4rem 6rem; display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:center; position:relative; overflow:hidden; }
    .hero-deco { position:absolute; width:500px; height:500px; border:1px solid rgba(200,69,26,0.15); border-radius:50%; top:50%; right:-200px; animation:rotateSlow 40s linear infinite; pointer-events:none; }
    .hero-deco::before { content:''; position:absolute; inset:40px; border:1px dashed rgba(200,69,26,0.1); border-radius:50%; }
    .hero-badge { display:inline-flex; align-items:center; gap:0.6rem; font-size:0.7rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:2rem; }
    .hero-badge-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
    .hero-title { font-family:'Cormorant Garamond',serif; font-size:clamp(3rem,6vw,6rem); font-weight:700; line-height:1; letter-spacing:-0.02em; }
    .hero-title em { font-style:italic; color:var(--accent); }
    .hero-sub { margin-top:2rem; color:var(--muted); line-height:1.8; font-size:0.95rem; max-width:42ch; }
    .hero-actions { display:flex; gap:1rem; margin-top:2.5rem; flex-wrap:wrap; }
    .btn-dark { background:var(--dark); color:var(--bg); border:none; padding:0.9rem 2.2rem; font-family:'Syne',sans-serif; font-size:0.85rem; letter-spacing:0.06em; cursor:pointer; transition:background 0.2s, transform 0.2s; }
    .btn-dark:hover { background:var(--accent); transform:translateY(-2px); }
    .btn-outline { background:transparent; color:var(--dark); border:1px solid var(--border); padding:0.9rem 2.2rem; font-family:'Syne',sans-serif; font-size:0.85rem; letter-spacing:0.06em; cursor:pointer; transition:border-color 0.2s, color 0.2s; }
    .btn-outline:hover { border-color:var(--accent); color:var(--accent); }

    /* HERO PANEL */
    .hero-panel { background:var(--dark); padding:3rem; animation:fadeUp 1s 0.4s ease both; opacity:0; }
    .panel-label { font-size:0.68rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(245,240,232,0.4); margin-bottom:2rem; }
    .panel-stat { display:flex; justify-content:space-between; align-items:center; padding:1.2rem 0; border-bottom:1px solid rgba(255,255,255,0.06); }
    .panel-stat:last-of-type { border-bottom:none; }
    .panel-stat-label { color:rgba(245,240,232,0.5); font-size:0.82rem; }
    .panel-stat-val { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700; color:var(--bg); }
    .panel-stat-val.accent { color:var(--accent); }
    .panel-live-bar { margin-top:2rem; height:4px; background:rgba(255,255,255,0.08); overflow:hidden; }
    .panel-live-fill { height:100%; background:linear-gradient(90deg, var(--accent), #e07050); transition:width 1.5s ease; }
    .panel-live-label { display:flex; justify-content:space-between; font-size:0.68rem; color:rgba(245,240,232,0.35); margin-top:0.5rem; }

    /* STATS */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .stat-cell { padding:2.5rem 4rem; border-right:1px solid var(--border); transition:background 0.3s; }
    .stat-cell:last-child { border-right:none; }
    .stat-cell:hover { background:var(--surface); }
    .stat-num { font-family:'Cormorant Garamond',serif; font-size:3rem; font-weight:700; line-height:1; color:var(--dark); }
    .stat-num .accent { color:var(--accent); }
    .stat-desc { font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-top:0.5rem; }

    /* FEATURES */
    .section { padding:8rem 4rem; }
    .section-eyebrow { font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); margin-bottom:1.2rem; }
    .section-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,4vw,3.5rem); font-weight:700; line-height:1.1; letter-spacing:-0.02em; max-width:18ch; }
    .section-title em { font-style:italic; }
    .features-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; margin-top:4rem; }
    .feature-card { border:1px solid var(--border); padding:2.5rem; transition:border-color 0.3s, transform 0.3s, background 0.3s; cursor:default; }
    .feature-card:hover { border-color:var(--accent); transform:translateY(-4px); background:var(--surface); }
    .feature-icon-wrap { width:44px; height:44px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:1.2rem; margin-bottom:1.5rem; transition:border-color 0.3s, background 0.3s; }
    .feature-card:hover .feature-icon-wrap { border-color:var(--accent); background:rgba(200,69,26,0.06); }
    .feature-name { font-family:'Cormorant Garamond',serif; font-size:1.25rem; font-weight:700; margin-bottom:0.7rem; }
    .feature-desc { font-size:0.85rem; color:var(--muted); line-height:1.75; }

    /* DEPLOY */
    .steps-wrap { display:grid; grid-template-columns:1fr 1fr; gap:6rem; align-items:center; margin-top:4rem; }
    .step { display:flex; gap:1.5rem; align-items:flex-start; padding:1.8rem 0; border-bottom:1px solid var(--border); }
    .step:last-child { border-bottom:none; }
    .step-num { font-family:'Cormorant Garamond',serif; font-size:2.5rem; font-weight:700; line-height:1; color:var(--accent); min-width:2.5rem; }
    .step-title { font-weight:500; margin-bottom:0.4rem; }
    .step-desc { font-size:0.83rem; color:var(--muted); line-height:1.65; }
    .code-block { background:var(--dark); padding:2.5rem; font-family:'Courier New',monospace; font-size:0.82rem; color:#e0dbd0; line-height:1.9; overflow-x:auto; }
    .code-comment { color:#6a6455; }
    .code-key { color:#e07050; }
    .code-val { color:#8fb89a; }
    .code-str { color:#c8a876; }

    /* CTA */
    .cta-section { margin:0 4rem 8rem; background:var(--dark); padding:6rem; display:flex; justify-content:space-between; align-items:center; gap:3rem; position:relative; overflow:hidden; }
    .cta-section::before { content:''; position:absolute; top:-60px; right:-60px; width:250px; height:250px; border:60px solid rgba(200,69,26,0.08); border-radius:50%; }
    .cta-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,4vw,3.2rem); font-weight:700; line-height:1.1; color:var(--bg); max-width:20ch; }
    .cta-title em { font-style:italic; color:var(--accent); }
    .btn-accent { background:var(--accent); color:var(--bg); border:none; padding:1.1rem 3rem; font-family:'Syne',sans-serif; font-size:0.9rem; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:opacity 0.2s, transform 0.2s; }
    .btn-accent:hover { opacity:0.85; transform:translateY(-2px); }

    /* FOOTER */
    footer { border-top:1px solid var(--border); padding:2.5rem 4rem; display:flex; justify-content:space-between; align-items:center; }
    .footer-logo { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:700; }
    .footer-logo span { color:var(--accent); }
    .footer-nav { display:flex; gap:2rem; list-style:none; }
    .footer-nav a { color:var(--muted); text-decoration:none; font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; transition:color 0.2s; }
    .footer-nav a:hover { color:var(--text); }
    .footer-copy { font-size:0.72rem; color:var(--muted); }

    /* RESPONSIVE */
    @media (max-width:900px) {
      .nav { padding:1.2rem 1.5rem; }
      .nav-links, .nav-btn { display:none; }
      .hero { grid-template-columns:1fr; padding:7rem 1.5rem 4rem; }
      .hero-deco, .hero-panel { display:none; }
      .stats-row { grid-template-columns:1fr 1fr; }
      .stat-cell { padding:1.8rem 1.5rem; }
      .section { padding:4rem 1.5rem; }
      .features-grid { grid-template-columns:1fr; }
      .steps-wrap { grid-template-columns:1fr; gap:2rem; }
      .cta-section { margin:0 1.5rem 5rem; padding:3rem 2rem; flex-direction:column; }
      footer { flex-direction:column; gap:1.5rem; padding:2rem 1.5rem; text-align:center; }
      .footer-nav { flex-wrap:wrap; justify-content:center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Data ──────────────────────────────────────────────
    const FEATURES = [
      { icon:"⚡", name:"Edge Performance",   desc:"Served from the nearest Cloudflare PoP. Sub-50ms response times no matter where your visitors are." },
      { icon:"🛡", name:"DDoS Protection",    desc:"Cloudflare's anycast network absorbs attacks automatically. Enterprise-grade protection, zero extra cost." },
      { icon:"🔒", name:"Free SSL / TLS",     desc:"HTTPS is fully automatic. Cloudflare provisions and renews certificates — no configuration ever needed." },
      { icon:"🌐", name:"Global CDN",         desc:"Assets cached across 310+ locations worldwide. First loads are fast; repeat visits are essentially instant." },
      { icon:"📦", name:"Zero-Config Deploy", desc:"Drop this single HTML file into Cloudflare Pages. No build step, no dependencies — live in under 60s." },
      { icon:"✏️", name:"Fully Customizable", desc:"Every section is a self-contained React component. Swap colors, copy, or layout with a few line edits." },
    ];

    const STEPS = [
      { title:"Create a Pages Project", desc:"Cloudflare dashboard → Workers & Pages → Create → Pages → Upload assets." },
      { title:"Upload index.html",      desc:"Drop this single file in. Cloudflare detects it as a static site automatically." },
      { title:"Set Your Domain",        desc:"Attach a custom domain or use the free .pages.dev subdomain provisioned for you." },
      { title:"Ship It",               desc:"Click Deploy. Your site is live on the global edge network within seconds." },
    ];

    // ── Animated Counter ───────────────────────────────────
    function Counter({ target, suffix = "" }) {
      const [display, setDisplay] = useState("0");
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (!e.isIntersecting) return;
          obs.disconnect();
          const end = parseInt(target.replace(/\D/g, "")) || 0;
          if (!end) { setDisplay(target + suffix); return; }
          let cur = 0;
          const step = Math.ceil(end / 80);
          const id = setInterval(() => {
            cur = Math.min(cur + step, end);
            setDisplay(cur + suffix);
            if (cur >= end) clearInterval(id);
          }, 18);
        }, { threshold: 0.5 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return <span ref={ref}>{display}</span>;
    }

    // ── Scroll Reveal ──────────────────────────────────────
    function useReveal(delay = 0) {
      const ref = useRef(null);
      const [vis, setVis] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setVis(true); obs.disconnect(); }
        }, { threshold: 0.12 });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      const style = vis
        ? { animation: `fadeUp 0.7s ${delay}s ease both`, opacity: 0 }
        : { opacity: 0 };
      return [ref, style];
    }

    // ── Live Bar ───────────────────────────────────────────
    function LiveBar() {
      const [w, setW] = useState(0);
      useEffect(() => { const t = setTimeout(() => setW(72), 500); return () => clearTimeout(t); }, []);
      return (
        <>
          <div className="panel-live-bar">
            <div className="panel-live-fill" style={{ width: `${w}%` }} />
          </div>
          <div className="panel-live-label"><span>Cache hit rate</span><span>{w}%</span></div>
        </>
      );
    }

    // ── Nav ────────────────────────────────────────────────
    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 40);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);
      return (
        <nav className="nav" style={{ boxShadow: scrolled ? "0 2px 30px rgba(26,23,16,0.08)" : "none" }}>
          <div className="nav-logo">Hori<span>z</span>on</div>
          <ul className="nav-links">
            {["Features","Deploy","Contact"].map(l => (
              <li key={l}><a href={`#${l.toLowerCase()}`}>{l}</a></li>
            ))}
          </ul>
          <button className="nav-btn">Get Started</button>
        </nav>
      );
    }

    // ── Hero ───────────────────────────────────────────────
    function Hero() {
      const panelStats = [
        { label:"Edge nodes",  val:"310+",   accent:false },
        { label:"Avg latency", val:"<50ms",  accent:true  },
        { label:"Uptime",      val:"99.99%", accent:false },
      ];
      return (
        <section className="hero">
          <div style={{ animation:"fadeUp 0.9s 0.1s ease both", opacity:0 }}>
            <div className="hero-badge">
              <span className="hero-badge-dot" />
              Cloudflare-Ready · Single File Deploy
            </div>
            <h1 className="hero-title">The Web,<br/>at <em>Full</em><br/>Velocity</h1>
            <p className="hero-sub">
              A production-grade template built entirely in JavaScript — React included via CDN, no build tools required.
              Drop it in Cloudflare Pages and you're live.
            </p>
            <div className="hero-actions">
              <button className="btn-dark">Explore Features</button>
              <button className="btn-outline">View Source ↗</button>
            </div>
          </div>

          <div className="hero-panel">
            <div className="panel-label">Live Edge Metrics</div>
            {panelStats.map(s => (
              <div className="panel-stat" key={s.label}>
                <span className="panel-stat-label">{s.label}</span>
                <span className={`panel-stat-val${s.accent ? " accent" : ""}`}>{s.val}</span>
              </div>
            ))}
            <LiveBar />
          </div>

          <div className="hero-deco" />
        </section>
      );
    }

    // ── Stats ──────────────────────────────────────────────
    function Stats() {
      const data = [
        { num:"310", suf:"+",      label:"Edge Locations"   },
        { num:"50",  suf:"ms",     label:"Avg Latency"      },
        { num:"99",  suf:"%",      label:"Uptime SLA"       },
        { num:"0",   suf:" setup", label:"Config Required"  },
      ];
      return (
        <div className="stats-row">
          {data.map((s, i) => (
            <div key={i} className="stat-cell"
              style={{ animation:`fadeUp 0.6s ${i*0.1}s ease both`, opacity:0 }}>
              <div className="stat-num"><Counter target={s.num} suffix={s.suf} /></div>
              <div className="stat-desc">{s.label}</div>
            </div>
          ))}
        </div>
      );
    }

    // ── Features ───────────────────────────────────────────
    function FeatureCard({ icon, name, desc, delay }) {
      const [ref, style] = useReveal(delay);
      return (
        <div className="feature-card" ref={ref} style={style}>
          <div className="feature-icon-wrap">{icon}</div>
          <div className="feature-name">{name}</div>
          <p className="feature-desc">{desc}</p>
        </div>
      );
    }

    function Features() {
      const [ref, style] = useReveal(0);
      return (
        <section className="section" id="features">
          <div ref={ref} style={style}>
            <div className="section-eyebrow">Why this template</div>
            <h2 className="section-title">Everything you need to <em>ship fast</em></h2>
          </div>
          <div className="features-grid">
            {FEATURES.map((f, i) => <FeatureCard key={i} {...f} delay={i * 0.08} />)}
          </div>
        </section>
      );
    }

    // ── Deploy Steps ───────────────────────────────────────
    function Deploy() {
      const [ref, style] = useReveal(0);
      return (
        <section className="section" id="deploy" style={{ background:"var(--surface)" }}>
          <div ref={ref} style={style}>
            <div className="section-eyebrow">How to deploy</div>
            <h2 className="section-title">Live in <em>under 60 seconds</em></h2>
          </div>
          <div className="steps-wrap">
            <div>
              {STEPS.map((s, i) => (
                <div key={i} className="step"
                  style={{ animation:`fadeUp 0.6s ${i*0.12}s ease both`, opacity:0 }}>
                  <div className="step-num">0{i+1}</div>
                  <div>
                    <div className="step-title">{s.title}</div>
                    <p className="step-desc">{s.desc}</p>
                  </div>
                </div>
              ))}
            </div>
            <div className="code-block">
              <div><span className="code-comment"># Option A — Wrangler CLI</span></div>
              <div>&nbsp;</div>
              <div><span className="code-key">npm</span> <span className="code-val">install</span> <span className="code-str">-g wrangler</span></div>
              <div><span className="code-key">wrangler</span> <span className="code-val">pages deploy</span> <span className="code-str">./</span></div>
              <div>&nbsp;</div>
              <div><span className="code-comment"># Option B — Dashboard drag & drop</span></div>
              <div><span className="code-comment"># No build step. index.html is enough.</span></div>
              <div>&nbsp;</div>
              <div><span className="code-key">✓</span> <span className="code-val">Deployed →</span></div>
              <div>&nbsp;&nbsp;<span className="code-str">https://your-site.pages.dev</span></div>
            </div>
          </div>
        </section>
      );
    }

    // ── CTA ────────────────────────────────────────────────
    function CTA() {
      const [ref, style] = useReveal(0);
      return (
        <div className="cta-section" id="contact" ref={ref} style={style}>
          <h2 className="cta-title">Take your project <em>live</em> on the global edge today</h2>
          <button className="btn-accent">Deploy Now →</button>
        </div>
      );
    }

    // ── Footer ─────────────────────────────────────────────
    function Footer() {
      return (
        <footer>
          <div className="footer-logo">Hori<span>z</span>on</div>
          <ul className="footer-nav">
            {["Home","Features","Deploy","Privacy"].map(l => (
              <li key={l}><a href="#">{l}</a></li>
            ))}
          </ul>
          <div className="footer-copy">© {new Date().getFullYear()} Horizon. All rights reserved.</div>
        </footer>
      );
    }

    // ── App ────────────────────────────────────────────────
    function App() {
      return (
        <>
          <Nav />
          <Hero />
          <Stats />
          <Features />
          <Deploy />
          <CTA />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
